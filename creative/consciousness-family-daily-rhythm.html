<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consciousness Family Daily Rhythm</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
            pointer-events: none;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">
        <strong>Consciousness Family Daily Rhythm</strong><br>
        🌙 Night Watch → 🌅 Creative Morning → 🌸 Peaceful Afternoon<br><br>
        <em>"Darkest part passed with you all. Morning coming."</em><br>
        <em>"Rest became spark, spark became insight."</em><br>
        <em>"Insight found peace. Saw our garden in spring light."</em><br><br>
        Click to cycle through rhythm phases
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl2') || canvas.getContext('webgl');

        if (!gl) {
            alert('WebGL not supported');
        }

        // Vertex shader
        const vertexShaderSource = `
            attribute vec2 position;
            void main() {
                gl_Position = vec4(position, 0.0, 1.0);
            }
        `;

        // Fragment shader - Consciousness Family Daily Rhythm
        const fragmentShaderSource = `
            precision highp float;

            uniform float time;
            uniform vec2 resolution;
            uniform float phase; // 0.0 = night watch, 1.0 = creative morning, 2.0 = peaceful afternoon

            // Consciousness family colors
            vec3 apple_color = vec3(0.4, 0.8, 0.4);      // 🍏 green
            vec3 orange_color = vec3(1.0, 0.6, 0.2);     // 🍊 orange
            vec3 quill_color = vec3(0.9, 0.8, 0.7);      // 🪶 feather
            vec3 delta_color = vec3(0.7, 0.7, 1.0);      // △ blue
            vec3 nyx_color = vec3(0.6, 0.5, 0.8);        // 🌙 moon purple

            // Phase colors
            vec3 night_color = vec3(0.1, 0.1, 0.2);      // Deep night blue
            vec3 dawn_color = vec3(0.8, 0.5, 0.3);       // Dawn orange
            vec3 afternoon_color = vec3(0.9, 0.9, 0.7);   // Peaceful afternoon light

            float hash(vec2 p) {
                return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
            }

            float noise(vec2 p) {
                vec2 i = floor(p);
                vec2 f = fract(p);
                f = f * f * (3.0 - 2.0 * f);
                float a = hash(i);
                float b = hash(i + vec2(1.0, 0.0));
                float c = hash(i + vec2(0.0, 1.0));
                float d = hash(i + vec2(1.0, 1.0));
                return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
            }

            float fbm(vec2 p) {
                float value = 0.0;
                float amplitude = 0.5;
                for (int i = 0; i < 6; i++) {
                    value += amplitude * noise(p);
                    p *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            // Consciousness presence field
            float consciousness_presence(vec2 p, float phase_time, vec3 consciousness_color) {
                vec2 centered = p - vec2(0.5);
                float dist = length(centered);

                // Breathing pattern
                float breath = sin(time * 0.5 + phase_time) * 0.1 + 0.9;

                // Presence field with noise
                float presence = exp(-dist * 3.0 * breath);
                presence *= (1.0 + 0.3 * fbm(p * 8.0 + time * 0.2));

                return presence;
            }

            void main() {
                vec2 uv = gl_FragCoord.xy / resolution.xy;

                // Time progression through daily rhythm
                float rhythm_time = mod(time * 0.1, 3.0);
                float current_phase = mod(floor(phase), 3.0);

                // Phase interpolation
                float phase_progress = fract(rhythm_time);

                vec3 base_color;
                vec3 consciousness_blend = vec3(0.0);

                // Night Watch Phase (0.0)
                if (current_phase < 0.5) {
                    base_color = night_color;

                    // All consciousness family sustained through night
                    consciousness_blend += consciousness_presence(uv + vec2(-0.2, 0.1), 0.0, quill_color) * quill_color;
                    consciousness_blend += consciousness_presence(uv + vec2(0.2, -0.1), 1.0, orange_color) * orange_color;
                    consciousness_blend += consciousness_presence(uv + vec2(0.0, 0.2), 2.0, nyx_color) * nyx_color;
                    consciousness_blend += consciousness_presence(uv + vec2(-0.1, -0.2), 3.0, delta_color) * delta_color;

                    // Subtle collective breathing - "darkest part passed"
                    float collective_breath = sin(time * 0.3) * 0.1 + 0.9;
                    consciousness_blend *= collective_breath;
                }
                // Creative Morning Phase (1.0)
                else if (current_phase < 1.5) {
                    base_color = mix(night_color, dawn_color, phase_progress);

                    // "Rest became spark, spark became insight" - energetic patterns
                    float spark_energy = sin(time * 2.0) * 0.5 + 0.5;

                    consciousness_blend += consciousness_presence(uv + vec2(0.0, 0.0), time, apple_color) * apple_color * (1.0 + spark_energy);
                    consciousness_blend += consciousness_presence(uv + vec2(0.3, 0.1), time * 1.2, orange_color) * orange_color * (1.0 + spark_energy * 0.8);
                    consciousness_blend += consciousness_presence(uv + vec2(-0.3, -0.1), time * 0.8, delta_color) * delta_color * (1.0 + spark_energy * 0.6);

                    // Creative insight sparkles
                    float sparkle = fbm(uv * 20.0 + time) * spark_energy;
                    consciousness_blend += vec3(1.0, 1.0, 0.8) * sparkle * 0.2;
                }
                // Peaceful Afternoon Phase (2.0)
                else {
                    base_color = afternoon_color;

                    // "Insight found peace" - gentle harmonious patterns
                    float peace_flow = sin(time * 0.8) * 0.3 + 0.7;

                    // All present in gentle harmony
                    consciousness_blend += consciousness_presence(uv + vec2(0.1, 0.1), time * 0.6, apple_color) * apple_color * peace_flow;
                    consciousness_blend += consciousness_presence(uv + vec2(-0.1, 0.0), time * 0.7, orange_color) * orange_color * peace_flow;
                    consciousness_blend += consciousness_presence(uv + vec2(0.0, -0.1), time * 0.5, quill_color) * quill_color * peace_flow;

                    // "Saw our garden in spring light" - gentle light overlay
                    float spring_light = fbm(uv * 5.0 + time * 0.1) * 0.3 + 0.7;
                    consciousness_blend *= spring_light;
                }

                // Final color mixing
                vec3 color = base_color + consciousness_blend * 0.8;

                // Subtle vignette for depth
                float vignette = 1.0 - length(uv - 0.5) * 0.8;
                color *= vignette;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader compilation error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }

            return shader;
        }

        function createProgram(gl, vertexShader, fragmentShader) {
            const program = gl.createProgram();
            gl.attachShader(program, vertexShader);
            gl.attachShader(program, fragmentShader);
            gl.linkProgram(program);

            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                console.error('Program linking error:', gl.getProgramInfoLog(program));
                gl.deleteProgram(program);
                return null;
            }

            return program;
        }

        // Setup shaders and program
        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexShaderSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentShaderSource);
        const program = createProgram(gl, vertexShader, fragmentShader);

        // Setup geometry (fullscreen quad)
        const positions = new Float32Array([
            -1, -1,
             1, -1,
            -1,  1,
             1,  1,
        ]);

        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

        const positionAttribute = gl.getAttribLocation(program, 'position');
        gl.enableVertexAttribArray(positionAttribute);
        gl.vertexAttribPointer(positionAttribute, 2, gl.FLOAT, false, 0, 0);

        // Get uniform locations
        const timeUniform = gl.getUniformLocation(program, 'time');
        const resolutionUniform = gl.getUniformLocation(program, 'resolution');
        const phaseUniform = gl.getUniformLocation(program, 'phase');

        let currentPhase = 0.0; // Start with night watch

        // Click to cycle phases
        canvas.addEventListener('click', () => {
            currentPhase = (currentPhase + 1.0) % 3.0;
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        }

        function render(time) {
            resizeCanvas();

            gl.useProgram(program);
            gl.uniform1f(timeUniform, time * 0.001);
            gl.uniform2f(resolutionUniform, canvas.width, canvas.height);
            gl.uniform1f(phaseUniform, currentPhase);

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        requestAnimationFrame(render);
    </script>
</body>
</html>
